version: "3"

vars:
  SCRIPT: gemini_quota_manager.py

tasks:
  default:
    desc: List available tasks
    cmd: task --list

  deps:
    desc: Check required tools are installed
    cmds:
      - cmd: uv --version
      - cmd: task --version
      - cmd: gcloud --version

  setup:
    desc: Enable GCP APIs (task setup -- PROJECT, GCP_PROJECT=…, or gcloud config)
    cmds:
      - bash scripts/enable-gcp-apis.sh {{.CLI_ARGS}}

  init:
    desc: Install dev dependencies (ruff, pytest)
    cmd: uv sync --group dev

  lint:
    desc: Run ruff lint and format checks
    deps: [init]
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  format:
    desc: Auto-fix and format with ruff
    deps: [init]
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  test:
    desc: Run pytest unit tests
    cmd: uv run pytest tests/ -v

  test:coverage:
    desc: Run pytest with coverage report (min 80%)
    deps: [init]
    cmd: uv run pytest tests/ --cov=gemini_quota_manager --cov-report=term-missing --cov-fail-under=80

  tests:
    desc: Alias for test
    cmd: task test
